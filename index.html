<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Cashback</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f4;
      --surface: #ffffff;
      --border: #e2e0d8;
      --text: #1c1b19;
      --muted: #6b6a64;
      --accent: #1d9e75;
      --accent-dark: #0f6e56;
      --vip: #534AB7;
      --danger: #D85A30;
      --radius: 12px;
      --shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    header { text-align: center; margin-bottom: 2rem; }
    header h1 { font-size: 1.75rem; font-weight: 600; letter-spacing: -0.02em; }
    header p { color: var(--muted); margin-top: 0.4rem; font-size: 0.95rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.5rem;
      width: 100%;
      max-width: 480px;
    }
    .card + .card { margin-top: 1.25rem; }

    .card h2 {
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field { margin-bottom: 1rem; }

    label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.4rem; }

    .tipo-selector { display: flex; gap: 0.5rem; }

    .tipo-btn {
      flex: 1;
      padding: 0.6rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: transparent;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--muted);
    }
    .tipo-btn:hover { border-color: var(--accent); color: var(--accent); }
    .tipo-btn.active-normal { border-color: var(--accent); background: #e1f5ee; color: var(--accent-dark); }
    .tipo-btn.active-vip { border-color: var(--vip); background: #EEEDFE; color: var(--vip); }

    .input-row { display: flex; gap: 0.75rem; }
    .input-row .field { flex: 1; }

    input[type="text"] {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.15s;
      outline: none;
      background: var(--surface);
    }
    input[type="text"]:focus { border-color: var(--accent); }

    .desconto-wrap { position: relative; }
    .desconto-wrap input { padding-right: 2rem; }
    .desconto-wrap span {
      position: absolute; right: 0.75rem; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); font-size: 0.9rem; pointer-events: none;
    }

    .hint { font-size: 0.75rem; color: var(--muted); margin-top: 0.3rem; }

    .btn-calcular {
      width: 100%;
      padding: 0.75rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.5rem;
    }
    .btn-calcular:hover { background: var(--accent-dark); }
    .btn-calcular:disabled { background: var(--border); cursor: not-allowed; }

    .resultado { display: none; margin-top: 1.25rem; border-top: 1px solid var(--border); padding-top: 1.25rem; }
    .resultado.visivel { display: block; }

    .resultado-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    .metric { background: var(--bg); border-radius: 8px; padding: 0.85rem 1rem; }
    .metric span { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.25rem; }
    .metric strong { font-size: 1.3rem; font-weight: 700; color: var(--accent-dark); }
    .metric.percentual strong { color: var(--vip); }
    .metric.destaque { grid-column: 1 / -1; }
    .metric.destaque strong { font-size: 2rem; }

    .desconto-tag {
      display: inline-block;
      background: #FAECE7;
      color: var(--danger);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 0.4rem;
    }

    .erro {
      background: #FAECE7;
      color: var(--danger);
      border-radius: 8px;
      padding: 0.65rem 1rem;
      font-size: 0.875rem;
      margin-top: 0.75rem;
      display: none;
    }

    .historico-tabela { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    .historico-tabela th {
      text-align: left; padding: 0.5rem; color: var(--muted);
      font-weight: 500; font-size: 0.75rem; border-bottom: 1px solid var(--border);
    }
    .historico-tabela td { padding: 0.6rem 0.5rem; border-bottom: 1px solid var(--bg); }
    .historico-tabela tr:last-child td { border-bottom: none; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; font-weight: 500; }
    .badge-normal { background: #e1f5ee; color: var(--accent-dark); }
    .badge-vip    { background: #EEEDFE; color: var(--vip); }

    .vazio { text-align: center; color: var(--muted); padding: 1.5rem 0; font-size: 0.875rem; }
  </style>
</head>
<body>

<header>
  <h1>💰 Cashback</h1>
  <p>Calcule o cashback da sua compra instantaneamente</p>
</header>

<div class="card">
  <h2>Nova Consulta</h2>

  <div class="field">
    <label>Tipo de cliente</label>
    <div class="tipo-selector">
      <button class="tipo-btn active-normal" id="btn-normal" onclick="selecionarTipo('normal')">Normal</button>
      <button class="tipo-btn" id="btn-vip" onclick="selecionarTipo('vip')">VIP ⭐</button>
    </div>
  </div>

  <div class="input-row">
    <div class="field">
      <label for="valor">Valor da compra (R$)</label>
      <input type="text" id="valor" placeholder="Ex: 600,00" oninput="formatarValor(this)" onkeydown="enterCalcula(event)" />
    </div>
    <div class="field">
      <label for="desconto">Desconto (opcional)</label>
      <div class="desconto-wrap">
        <input type="text" id="desconto" placeholder="0" oninput="formatarDesconto(this)" onkeydown="enterCalcula(event)" />
        <span>%</span>
      </div>
      <p class="hint">Deixe vazio para sem desconto</p>
    </div>
  </div>

  <button class="btn-calcular" onclick="calcular()">Calcular Cashback</button>

  <div class="erro" id="erro"></div>

  <div class="resultado" id="resultado">
    <div class="resultado-grid">
      <div class="metric">
        <span>Valor da compra</span>
        <strong id="res-valor">—</strong>
      </div>
      <div class="metric">
        <span>Valor com desconto</span>
        <strong id="res-final">—</strong>
        <span id="res-desconto-tag"></span>
      </div>
      <div class="metric percentual">
        <span>Percentual de cashback</span>
        <strong id="res-percentual">—</strong>
      </div>
      <div class="metric destaque">
        <span>Seu cashback</span>
        <strong id="res-cashback">—</strong>
      </div>
    </div>
  </div>
</div>

<div class="card">
  <h2>Histórico deste IP</h2>
  <div id="historico-conteudo"><div class="vazio">Carregando...</div></div>
</div>

<script>
  // ALTERAÇÃO AQUI: Substitua pela URL do seu backend hospedado (ex: Render, Railway)
  // Lembre-se: O GitHub Pages usa HTTPS, então sua API também deve ser HTTPS.
  const API = "https://testepraticonology.onrender.com/";
  
  let tipoSelecionado = "normal";

  function selecionarTipo(tipo) {
    tipoSelecionado = tipo;
    document.getElementById("btn-normal").className = "tipo-btn" + (tipo === "normal" ? " active-normal" : "");
    document.getElementById("btn-vip").className    = "tipo-btn" + (tipo === "vip"    ? " active-vip"    : "");
  }

  // ... (funções formatarValor, formatarDesconto, parseValor, fmtBRL e mostrarErro continuam iguais) ...

  async function calcular() {
    const valorStr = document.getElementById("valor").value.trim();
    if (!valorStr) { mostrarErro("Por favor, insira o valor da compra."); return; }

    const valor = parseValor(valorStr);
    if (isNaN(valor) || valor <= 0) { mostrarErro("Valor inválido. Use formato como 600,00"); return; }

    const descontoStr = document.getElementById("desconto").value.trim();
    const desconto = descontoStr ? parseValor(descontoStr) : 0;
    if (isNaN(desconto) || desconto < 0 || desconto > 100) {
      mostrarErro("Desconto inválido. Use um valor entre 0 e 100.");
      return;
    }

    const btn = document.querySelector(".btn-calcular");
    btn.disabled = true;
    btn.textContent = "Calculando...";

    try {
      // O fetch agora usará a URL da nuvem
      const resp = await fetch(`${API}/calcular`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ 
            tipo_cliente: tipoSelecionado, 
            valor_compra: valor, 
            desconto: desconto 
        }),
      });

      if (!resp.ok) throw new Error("Erro na resposta da API");
      const data = await resp.json();

      document.getElementById("res-valor").textContent = fmtBRL(data.valor_compra);
      document.getElementById("res-final").textContent = fmtBRL(data.valor_final);
      document.getElementById("res-percentual").textContent = data.percentual.toFixed(1) + "%";
      document.getElementById("res-cashback").textContent = fmtBRL(data.cashback);

      const tagEl = document.getElementById("res-desconto-tag");
      if (data.desconto > 0) {
        tagEl.innerHTML = `<span class="desconto-tag">-${data.desconto.toFixed(1)}% desconto</span>`;
      } else {
        tagEl.innerHTML = "";
      }

      document.getElementById("resultado").classList.add("visivel");
      carregarHistorico();
    } catch (err) {
      mostrarErro("Erro ao conectar com a API na nuvem. Verifique o CORS no backend.");
      console.error(err);
    } finally {
      btn.disabled = false;
      btn.textContent = "Calcular Cashback";
    }
  }

  async function carregarHistorico() {
    const el = document.getElementById("historico-conteudo");
    try {
      const resp = await fetch(`${API}/historico`);
      if (!resp.ok) throw new Error();
      const dados = await resp.json();

      if (dados.length === 0) {
        el.innerHTML = '<div class="vazio">Nenhuma consulta encontrada para o seu IP.</div>';
        return;
      }

      let html = `<table class="historico-tabela">
        <thead><tr>
          <th>Tipo</th><th>Compra</th><th>Desc.</th><th>Final</th><th>Cashback</th>
        </tr></thead><tbody>`;

      for (const r of dados) {
        html += `<tr>
          <td><span class="badge badge-${r.tipo_cliente}">${r.tipo_cliente.toUpperCase()}</span></td>
          <td>${fmtBRL(r.valor_compra)}</td>
          <td>${r.desconto > 0 ? r.desconto.toFixed(1) + "%" : "—"}</td>
          <td>${fmtBRL(r.valor_final)}</td>
          <td><strong>${fmtBRL(r.cashback)}</strong> <small style="color:var(--muted)">${r.percentual.toFixed(1)}%</small></td>
        </tr>`;
      }

      html += "</tbody></table>";
      el.innerHTML = html;
    } catch {
      el.innerHTML = '<div class="vazio">Não foi possível carregar o histórico.</div>';
    }
  }

  carregarHistorico();
</script>
</body>
</html>
