<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Cashback</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f4;
      --surface: #ffffff;
      --border: #e2e0d8;
      --text: #1c1b19;
      --muted: #6b6a64;
      --accent: #1d9e75;
      --accent-dark: #0f6e56;
      --vip: #534AB7;
      --danger: #D85A30;
      --radius: 12px;
      --shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    header { text-align: center; margin-bottom: 2rem; }
    header h1 { font-size: 1.75rem; font-weight: 600; letter-spacing: -0.02em; }
    header p { color: var(--muted); margin-top: 0.4rem; font-size: 0.95rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.5rem;
      width: 100%;
      max-width: 480px;
    }
    .card + .card { margin-top: 1.25rem; }

    .card h2 {
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field { margin-bottom: 1rem; }

    label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.4rem; }

    .tipo-selector { display: flex; gap: 0.5rem; }

    .tipo-btn {
      flex: 1;
      padding: 0.6rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: transparent;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--muted);
    }
    .tipo-btn:hover { border-color: var(--accent); color: var(--accent); }
    .tipo-btn.active-normal { border-color: var(--accent); background: #e1f5ee; color: var(--accent-dark); }
    .tipo-btn.active-vip { border-color: var(--vip); background: #EEEDFE; color: var(--vip); }

    .input-row { display: flex; gap: 0.75rem; }
    .input-row .field { flex: 1; }

    input[type="text"] {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.15s;
      outline: none;
      background: var(--surface);
    }
    input[type="text"]:focus { border-color: var(--accent); }

    .desconto-wrap { position: relative; }
    .desconto-wrap input { padding-right: 2rem; }
    .desconto-wrap span {
      position: absolute; right: 0.75rem; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); font-size: 0.9rem; pointer-events: none;
    }

    .hint { font-size: 0.75rem; color: var(--muted); margin-top: 0.3rem; }

    .btn-calcular {
      width: 100%;
      padding: 0.75rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.5rem;
    }
    .btn-calcular:hover { background: var(--accent-dark); }
    .btn-calcular:disabled { background: var(--border); cursor: not-allowed; }

    .resultado { display: none; margin-top: 1.25rem; border-top: 1px solid var(--border); padding-top: 1.25rem; }
    .resultado.visivel { display: block; }

    .resultado-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    .metric { background: var(--bg); border-radius: 8px; padding: 0.85rem 1rem; }
    .metric span { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.25rem; }
    .metric strong { font-size: 1.3rem; font-weight: 700; color: var(--accent-dark); }
    .metric.percentual strong { color: var(--vip); }
    .metric.destaque { grid-column: 1 / -1; }
    .metric.destaque strong { font-size: 2rem; }

    .desconto-tag {
      display: inline-block;
      background: #FAECE7;
      color: var(--danger);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 0.4rem;
    }

    .erro {
      background: #FAECE7;
      color: var(--danger);
      border-radius: 8px;
      padding: 0.65rem 1rem;
      font-size: 0.875rem;
      margin-top: 0.75rem;
      display: none;
    }

    .historico-tabela { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    .historico-tabela th {
      text-align: left; padding: 0.5rem; color: var(--muted);
      font-weight: 500; font-size: 0.75rem; border-bottom: 1px solid var(--border);
    }
    .historico-tabela td { padding: 0.6rem 0.5rem; border-bottom: 1px solid var(--bg); }
    .historico-tabela tr:last-child td { border-bottom: none; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; font-weight: 500; }
    .badge-normal { background: #e1f5ee; color: var(--accent-dark); }
    .badge-vip    { background: #EEEDFE; color: var(--vip); }

    .vazio { text-align: center; color: var(--muted); padding: 1.5rem 0; font-size: 0.875rem; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #f5f5f4; --surface: #ffffff; --border: #e2e0d8; --text: #1c1b19; --muted: #6b6a64; --accent: #1d9e75; --accent-dark: #0f6e56; --vip: #534AB7; --danger: #D85A30; --radius: 12px; --shadow: 0 1px 4px rgba(0,0,0,0.07); }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem 4rem; }
        header { text-align: center; margin-bottom: 2rem; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.5rem; width: 100%; max-width: 480px; }
        .card + .card { margin-top: 1.25rem; }
        .field { margin-bottom: 1rem; }
        .tipo-selector { display: flex; gap: 0.5rem; }
        .tipo-btn { flex: 1; padding: 0.6rem 1rem; border: 1.5px solid var(--border); border-radius: 8px; cursor: pointer; }
        .tipo-btn.active-normal { border-color: var(--accent); background: #e1f5ee; }
        .tipo-btn.active-vip { border-color: var(--vip); background: #EEEDFE; }
        input[type="text"] { width: 100%; padding: 0.65rem 0.85rem; border: 1.5px solid var(--border); border-radius: 8px; }
        .btn-calcular { width: 100%; padding: 0.75rem; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .resultado { display: none; margin-top: 1.25rem; border-top: 1px solid var(--border); padding-top: 1.25rem; }
        .resultado.visivel { display: block; }
        .erro { background: #FAECE7; color: var(--danger); padding: 0.65rem 1rem; border-radius: 8px; display: none; margin-top: 1rem; }
        .historico-tabela { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        .historico-tabela th, .historico-tabela td { padding: 0.5rem; border-bottom: 1px solid var(--bg); text-align: left; }
        .badge { padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; }
        .badge-normal { background: #e1f5ee; color: var(--accent-dark); }
        .badge-vip { background: #EEEDFE; color: var(--vip); }
  </style>
</head>
<body>

<header>
    <h1>💰 Cashback</h1>
    <p>Calcule o seu benefício instantaneamente</p>
</header>

<div class="card">
    <h2>Nova Consulta</h2>
    <div class="field">
        <label>Tipo de cliente</label>
        <div class="tipo-selector">
            <button class="tipo-btn active-normal" id="btn-normal" onclick="selecionarTipo('normal')">Normal</button>
            <button class="tipo-btn" id="btn-vip" onclick="selecionarTipo('vip')">VIP ⭐</button>
        </div>
    </div>

    <div style="display: flex; gap: 10px;">
        <div class="field" style="flex: 2;">
            <label>Valor da compra (R$)</label>
            <input type="text" id="valor" placeholder="0,00" oninput="formatarValor(this)" onkeydown="enterCalcula(event)">
        </div>
        <div class="field" style="flex: 1;">
            <label>Desconto (%)</label>
            <input type="text" id="desconto" placeholder="0" oninput="formatarDesconto(this)" onkeydown="enterCalcula(event)">
        </div>
    </div>

    <button class="btn-calcular" onclick="calcular()">Calcular Cashback</button>
    <div class="erro" id="erro"></div>

    <div class="resultado" id="resultado">
        <p>Valor Final: <strong id="res-final"></strong></p>
        <p>Cashback: <strong id="res-cashback"></strong> (<span id="res-percentual"></span>)</p>
    </div>
</div>

<div class="card">
    <h2>Histórico deste IP</h2>
    <div id="historico-conteudo">Carregando...</div>
</div>

<script>
    // URL da sua API no Render (sem barra no final)
    const API = "https://testepraticonology.onrender.com";
    let tipoSelecionado = "normal";

    function selecionarTipo(tipo) {
        tipoSelecionado = tipo;
        document.getElementById("btn-normal").className = "tipo-btn" + (tipo === "normal" ? " active-normal" : "");
        document.getElementById("btn-vip").className = "tipo-btn" + (tipo === "vip" ? " active-vip" : "");
    }

    function formatarValor(el) {
        el.value = el.value.replace(/[^\d,]/g, "");
    }

    function formatarDesconto(el) {
        el.value = el.value.replace(/[^\d,]/g, "");
        const v = parseFloat(el.value.replace(",", "."));
        if (v > 100) el.value = "100";
    }

    function parseValor(str) {
        return parseFloat(str.replace(",", "."));
    }

    function fmtBRL(n) {
        return n.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
    }

    function mostrarErro(msg) {
        const el = document.getElementById("erro");
        el.textContent = msg;
        el.style.display = "block";
        setTimeout(() => { el.style.display = "none"; }, 4000);
    }

    function enterCalcula(e) {
        if (e.key === "Enter") calcular();
    }

    async function calcular() {
        const valorStr = document.getElementById("valor").value.trim();
        if (!valorStr) { mostrarErro("Insira o valor."); return; }
        
        const valor = parseValor(valorStr);
        const descontoStr = document.getElementById("desconto").value.trim();
        const desconto = descontoStr ? parseValor(descontoStr) : 0;

        try {
            const resp = await fetch(`${API}/calcular`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ tipo_cliente: tipoSelecionado, valor_compra: valor, desconto: desconto })
            });
            const data = await resp.json();
            
            document.getElementById("res-final").textContent = fmtBRL(data.valor_final);
            document.getElementById("res-cashback").textContent = fmtBRL(data.cashback);
            document.getElementById("res-percentual").textContent = data.percentual + "%";
            document.getElementById("resultado").classList.add("visivel");
            carregarHistorico();
        } catch (err) {
            mostrarErro("Erro ao conectar com a API.");
        }
    }

    async function carregarHistorico() {
        const el = document.getElementById("historico-conteudo");
        try {
            const resp = await fetch(`${API}/historico`);
            const dados = await resp.json();
            if (dados.length === 0) {
                el.innerHTML = "Nenhuma consulta para este IP.";
                return;
            }
            let html = '<table class="historico-tabela"><thead><tr><th>Tipo</th><th>Final</th><th>Cashback</th></tr></thead><tbody>';
            dados.forEach(r => {
                html += `<tr>
                    <td><span class="badge badge-${r.tipo_cliente}">${r.tipo_cliente.toUpperCase()}</span></td>
                    <td>${fmtBRL(r.valor_final)}</td>
                    <td>${fmtBRL(r.cashback)}</td>
                </tr>`;
            });
            el.innerHTML = html + "</tbody></table>";
        } catch {
            el.innerHTML = "Erro ao carregar histórico.";
        }
    }

    carregarHistorico();
</script>
</body>
</html>
